name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase — KSP Business Pro
        run: |
          echo "Ping Supabase KSP Business Pro..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/produits_config?limit=1")
          echo "Status HTTP : $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Supabase operationnel"
          else
            echo "Reponse inattendue : $STATUS"
          fi
